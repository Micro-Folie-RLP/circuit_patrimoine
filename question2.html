<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Question 2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial, sans-serif; max-width: 500px; margin: 20px auto; text-align: center; padding: 20px; background: #f0f8ff; }
    h1 { color:#2e5c8a; }
    .reponse { display:block; margin:10px auto; padding:10px 20px; border-radius:25px; border:none; cursor:pointer; }
    .bonne { background:#4CAF50; color:#fff; }
    .mauvaise { background:#f44336; color:#fff; }
  </style>
</head>
<body>
  <h1>Question 2</h1>
  <p>Quel type de lieu est le lavoir ?</p>

  <!-- conteneur où les boutons seront générés -->
  <div id="answers"></div>

  <script>
    // tableau des réponses : texte + si c'est la bonne ou non
    const answers = [
      { text: 'Un lieu pour laver le linge', isCorrect: true },
      { text: 'Une maison d’habitation', isCorrect: false },
      { text: 'Un petit château', isCorrect: false }
    ];

    // fonction pour mélanger un tableau (Fisher-Yates shuffle)
    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function renderAnswers() {
      const container = document.getElementById('answers');
      container.innerHTML = '';

      const shuffled = shuffle(answers.slice()); // on copie le tableau avant de le mélanger

      shuffled.forEach(answer => {
        const btn = document.createElement('button');
        btn.className = 'reponse'; // même style pour toutes les réponses
        btn.textContent = answer.text;
        btn.onclick = function() {
          answerQuestion(answer.isCorrect);
        };
        container.appendChild(btn);
      });
    }

    function answerQuestion(isCorrect) {
      let good = parseInt(localStorage.getItem('scoreGood') || '0', 10);
      let bad = parseInt(localStorage.getItem('scoreBad') || '0', 10);

      if (isCorrect) {
        good++;
        localStorage.setItem('scoreGood', String(good));
      } else {
        bad++;
        localStorage.setItem('scoreBad', String(bad));
      }

      window.location.href = 'lieu2_eglise.html';
    }

    // on déclenche l’affichage des réponses quand la page se charge
    renderAnswers();
  </script>
</body>

</html>
