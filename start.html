<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Chasse au trésor – Départ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 20px auto;
      text-align: center;
      padding: 20px;
      background: #f0f8ff;
    }
    h1 { color: #2e5c8a; }
    input {
      padding: 10px;
      margin: 10px 0;
      font-size: 1em;
      width: 80%;
      max-width: 300px;
    }
    .reponse {
      display: block;
      margin: 10px auto;
      padding: 10px 20px;
      border-radius: 25px;
      border: none;
      cursor: pointer;
      background: #4CAF50;  /* vert pour toutes les réponses */
      color: #fff;
      font-size: 1em;
    }
  </style>
</head>
<body>
  <h1>Chasse au trésor – Roquefort-Les-Pins</h1>
  <p>Médiathèque – point de départ</p>

  <div>
    <p>Entrez votre prénom ou le nom de votre équipe :</p>
    <input type="text" id="playerName" placeholder="Votre nom">
  </div>

  <hr>

  <h2>Question 1</h2>
  <p>Quelle abbaye a possédé le fief de Roquefort au XIe siècle&nbsp;?</p>

  <!-- Les boutons seront générés ici -->
  <div id="answers"></div>

  <script>
    // Réinitialiser le score au début du jeu
    function initGame() {
      localStorage.setItem('scoreGood', '0');
      localStorage.setItem('scoreBad', '0');
    }

    // Réponses possibles (une seule bonne)
    const answers = [
      { text: 'Abbaye de Lérins',  isCorrect: true },
      { text: 'Abbaye de Grasse',  isCorrect: false },
      { text: 'Abbaye de Saint-Victor', isCorrect: false }
    ];

    // Mélange d’un tableau (Fisher–Yates)
    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function renderAnswers() {
      const container = document.getElementById('answers');
      container.innerHTML = '';

      const shuffled = shuffle(answers.slice());

      shuffled.forEach(answer => {
        const btn = document.createElement('button');
        btn.className = 'reponse';
        btn.textContent = answer.text;
        btn.onclick = function () {
          answerQuestion(answer.isCorrect);
        };
        container.appendChild(btn);
      });
    }

    function answerQuestion(isCorrect) {
      const nameInput = document.getElementById('playerName').value.trim();
      if (!nameInput) {
        alert('Merci d’indiquer votre nom avant de commencer.');
        return;
      }
      localStorage.setItem('playerName', nameInput);

      let good = parseInt(localStorage.getItem('scoreGood') || '0', 10);
      let bad  = parseInt(localStorage.getItem('scoreBad')  || '0', 10);

      if (isCorrect) {
        good++;
        localStorage.setItem('scoreGood', String(good));
      } else {
        bad++;
        localStorage.setItem('scoreBad', String(bad));
      }

      // Après la question 1, aller vers la page du lavoir
      window.location.href = 'lieu1_lavoir.html';
    }

    initGame();
    renderAnswers();
  </script>
</body>
</html>
